databases:
  - name: portfolio-db
    databaseName: portfoliodb
    user: portfolio_user

services:
  - type: web
    name: portfolio-app
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
